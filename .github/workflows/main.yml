name: Build Android APK
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # Устанавливаем 10-ю версию, так как проект её требует
          dotnet-version: 10.0.x

      - name: Install Workloads
        run: |
          cd maui-client
          dotnet workload restore

      - name: Build APK
        run: |
          cd maui-client
          # Собираем строго под Android, игнорируя iOS
          dotnet publish -f net10.0-android -c Release /p:AndroidKeyStore=false
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-to-freedom-apk
          path: maui-client/**/publish/*.apk
